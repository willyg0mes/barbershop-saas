# Proxy reverso na VPS (nginx do sistema → Docker compose na porta 8092)
# Instalar: sudo cp deploy/nginx/barbershop-vps.conf /etc/nginx/sites-available/barbershop
#           sudo ln -sf /etc/nginx/sites-available/barbershop /etc/nginx/sites-enabled/barbershop
#           sudo nginx -t && sudo systemctl reload nginx
# SSL: sudo certbot --nginx -d barber.wynext.online

upstream barbershop_compose {
    server 127.0.0.1:8092;
    keepalive 16;
}

# API barbeiro
server {
    listen 80;
    listen [::]:80;
    server_name barber.wynext.online;

    location / {
        proxy_pass http://barbershop_compose;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# PWA cliente (requer DNS app.wynext.online → VPS)
server {
    listen 80;
    listen [::]:80;
    server_name app.wynext.online;

    location / {
        proxy_pass http://barbershop_compose;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Tenants por subdomínio (*.wynext.online exceto barber/app)
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<subdomain>(?!barber|app)[a-z0-9-]+)\.wynext\.online$;

    location / {
        proxy_pass http://barbershop_compose;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

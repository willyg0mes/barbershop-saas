name: Web CI

on:
  push:
    branches: [main, "step-*"]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: https://barber.wynext.online
          NEXT_PUBLIC_DEFAULT_TENANT: dom-corte
          NEXT_PUBLIC_ROOT_DOMAIN: wynext.online
          API_URL: http://127.0.0.1:8080
        run: npm run build
